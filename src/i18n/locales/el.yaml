# What Google is doing
# what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: "Τον Αύγουστο του 2025, η Google [ανακοίνωσε](https://developer.android.com/developer-verification) μία νέα προϋπόθεση: Από τον Σεπτέμβριο του 2026, **κάθε προγραμματιστής εφαρμογών Android θα πρέπει να εγγραφεί κεντρικά στη Google** προτού το λογισμικό του μπορέσει να εγκατασταθεί σε οποιαδήποτε συσκευή. Όχι μόνο εφαρμογές του Play Store: Όλες οι εφαρμογές. Αυτό περιλαμβάνει εφαρμογές που μοιράζονται φίλοι μεταξύ τους, εφαρμογές που διανέμονται μέσω του [F-Droid](https://f-droid.org), εφαρμογές φτιαγμένες από ερασιτέχνες για προσωπική χρήση. Ανεξάρτητοι προγραμματιστές, θρησκευτικές και κοινωνικές ομάδες, καθώς και ερασιτέχνες, θα στερηθούν τη δυνατότητα να αναπτύσσουν και να διανέμουν το λογισμικό τους."
# Who this hurts
# impact_heading: "Who this hurts"
impact_heading: "Ποιοί βλάπτονται"
# impact_you_heading: "You"
impact_you_heading: "Εσύ"
# impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Αγόρασες ένα τηλέφωνο Android επειδή η Google σου είπε ότι ήταν ανοιχτό. Μπορούσες να εγκαταστήσεις ό,τι ήθελες, και αυτή ήταν η συμφωνία"
# impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: "Η Google τώρα αλλάζει αυτή τη συμφωνία, αναδρομικά, σε συσκευές που ήδη σου ανήκουν. Μετά την ενημέρωση, θα μπορείς να τρέξεις μόνο λογισμικό που η Google έχει προεγκρίνει. Στο τηλέφωνο σου: Την ιδιοκτησία *σου*, για την οποία *εσύ* πλήρωσες."
# impact_dev_heading: "Independent developers"
impact_dev_heading: "Ανεξάρτητοι προγραμματιστές"
# impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "Η πρώτη εφαρμογή ενός εφήβου, το εργαλείο ιδιωτικότητας που έγραψε ένας εθελοντής, ή η εμπιστευτική εσωτερική έκδοση beta μιας εταιρείας. Δεν έχει σημασία ποιο. Μετά τον Σεπτέμβριο του 2026, κανένα από αυτά δε θα μπορεί να εγκατασταθεί χωρίς την «ευλογία» της Google."
# impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: "Το [F-Droid](https://f-droid.org), πηγή για χιλιάδες δωρεάν εφαρμογές Android ανοιχτού κώδικα, έχει αποκαλέσει αυτό το γεγονός ως [«υπαρξιακή» απειλή](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Ο Cory Doctorow το αποκαλεί [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
# impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Κυβερνήσεις και η Κοινωνία των Πολιτών"
# impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: "Η Google έχει [αποδεδειγμένο ιστορικό](https://www.aclu.org/news/free-speech/app-store-oligopoly) συμμόρφωσης όταν αυταρχικά καθεστώτα απαιτούν την κατάργηση εφαρμογών. Με αυτό το πρόγραμμα, το λογισμικό που υποστηρίζει τις κρατικές υπηρεσίες της χώρας σου θα εξαρτάται από τη βούληση μιας και μόνο ξένης εταιρείας που δεν λογοδοτεί σε κανέναν."
# impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: "Το [EFF (Electronic Frontier Foundation) χαρακτηρίζει](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) τον έλεγχο πρόσβασης στις εφαρμογές ως «έναν συνεχώς διευρυνόμενο δρόμο προς τη λογοκρισία στο διαδίκτυο»."

# Advanced flow
# flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "Η «έξοδος διαφυγής» που προσφέρει η Google είναι μία παγίδα."
# flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: "Η Google αναφέρει ότι «προχωρημένοι χρήστες» μπορούν [«ακόμα να εγκαταστήσουν»](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) μη επαληθευμένες εφαρμογές. Δείτε πώς θα γίνεται αυτό *στην πραγματικότητα*:"
# flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Άνοιξε τις Ρυθμίσεις, βρες τις «Επιλογές προγραμματιστή»"
# flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Πάτα πάνω στον «Αριθμό Κατασκευής» **επτά φορές** για να ενεργοποιήσεις τη Λειτουργία Προγραμματιστή"
# flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Αγνόησε τις κινδυνολόγες προειδοποιήσεις περί εξαναγκασμού"
# flow_step4: "Enter your PIN"
flow_step4: "Πληκτρολόγησε το PIN σου"
# flow_step5: "Restart the device"
flow_step5: "Κάνε επανεκκίνηση της συσκευής"
# flow_step6: "**Wait 24 hours**"
flow_step6: "**Περίμενε 24 ώρες**"
# flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Επίστρεψε, αγνόησε ακόμα περισσότερα μηνύματα με κινδυνολογία"
# flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Επίλεξε «Να επιτρέπεται προσωρινά» (7 ημέρες) ή «Να επιτρέπεται πάντα»"
# flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Επιβεβαίωσε, για μία ακόμη φορα, ότι κατανοείς «τους κινδύνους»"
# flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Εννέα βήματα. Μία υποχρεωτική περίοδος αναμονής 24 ωρών. *Για να εγκαταστήσεις λογισμικό σε μία συσκευή που σου ανήκει*"
# flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: "Ακόμη χειρότερα: Αυτή η διαδικασία τρέχει αποκλειστικά μέσω των **Υπηρεσιών Google Play**, όχι μέσω του λειτουργικού συστήματος Android. Η Google μπορεί να την αλλάξει, να την περιορίσει, ή να την αφαιρέσει ανά πάσα στιγμή, χωρίς να χρειαστεί κάποια ενημέρωση λογισμικού ή έγκριση από τον χρήστη. Και μέχρι σήμερα, δεν έχει κυκλοφορήσει σε καμία έκδοση beta, preview ή canary. Υπάρχει μόνο ως ανάρτηση σε blog και μερικά mockups."

# Precedent
# precedent_heading: "This is bigger than Android"
precedent_heading: "Αυτό είναι μεγαλύτερο από το Android"
# precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Αν η Google μπορεί να «κλειδώσει» αναδρομικά δισεκατομμύρια συσκευές που πουλήθηκαν ως ανοιχτές πλατφόρμες, κάθε παραγωγός hardware στον πλανήτη παρακολουθεί."
# precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: "Η αρχή που καθιερώνεται είναι η εξής: **η εταιρεία που κατασκεύασε τη συσκευή σου έχει το δικαίωμα να αποφασίζει, αφού την αγοράσεις, ποιο λογισμικό επιτρέπεται να χρησιμοποιείς.** Στον κόσμο του λογισμικού, αυτό ονομάζεται «rug pull» - αλλά τουλάχιστον σε αυτή την περίπτωση μπορούσες πάντα να εγκαταστήσεις ανταγωνιστικό λογισμικό. Στον κόσμο του hardware, πρόκειται για ένα *τετελεσμένο γεγονός* που σου στερεί κάθε δυνατότητα επιλογής και σε καθιστά ανίσχυρο απέναντι στις ιδιοτροπίες ενός και μοναδικού, μη υπόλογου «φρουρού» και νομικά διαπιστωμένου μονοπωλητή." 
# precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: "Η «ανοιχτή φύση» του Android δεν ήταν ποτέ απλώς ένα χαρακτηριστικό του. Ήταν η *υπόσχεση* που το καθιστούσε διαφορετικό από το iPhone. Εκατομμύρια χρήστες επέλεξαν το Android ακριβώς για αυτόν τον λόγο. Η Google τώρα ανακαλεί μονομερώς αυτή την υπόσχεση, σε συσκευές που βρίσκονται ήδη στην κατοχή των χρηστών, επειδή αποφάσισε ότι έχει αρκετή κυριαρχία στην αγορά και επιρροή στους ρυθμιστικούς φορείς ώστε να τη γλιτώσει."
# precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *«Ο φθόνος της Google για την Apple απειλεί να καταστρέψει την παράδοση της ανοιχτής πλατφόρμας του Android.»*"

