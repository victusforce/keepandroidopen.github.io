social_callout_mastodon_2: "Το πρόγραμμα επαλήθευσης προγραμματιστών της Google για Android απαιτεί επίσημο έγγραφο ταυτότητας, κλειδιά υπογραφής και ένα τέλος για κάθε προγραμματιστή που θέλει το λογισμικό του να μπορεί να εγκατασταθεί στο Android. Η EFF χαρακτηρίζει την επιλεκτική πρόσβαση στις εφαρμογές ως «μονοπάτι προς τη λογοκρισία». 67+ οργανώσεις έχουν υπογράψει ανοιχτή επιστολή αντιδρώντας σε αυτή την πολιτική. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "Το F-Droid, πηγή χιλιάδων δωρεάν και εφαρμογών Android ανοιχτού κώδικα, χαρακτηρίζει την επαλήθευση προγραμματιστών της Google ως «υπαρξιακή απειλή». Υπολογίζεται ότι το 85% των εφαρμογών του F-Droid ενδέχεται να αντιμετωπίσει προβλήματα διανομής επειδή οι προγραμματιστές τους υπέγραψαν μέσω του F-Droid και όχι μέσω της Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Η προτεινόμενη από την Google εναλλακτική λύση για την εγκατάσταση μη επαληθευμένων εφαρμογών απαιτεί 9 βήματα, μια υποχρεωτική περίοδο αναμονής 24 ωρών και εκτελείται μέσω των Υπηρεσιών Google Play, όχι μέσω του λειτουργικού συστήματος Android. Η Google μπορεί να την τροποποιήσει ή να την αφαιρέσει οποιαδήποτε στιγμή χωρίς τη συγκατάθεση του χρήστη. Δεν έχει κυκλοφορήσει σε καμία έκδοση beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "Η υποχρεωτική εγγραφή προγραμματιστών που επιβάλλει η Google στο Android προκαλεί ανησυχίες για προγραμματιστές σε χώρες που υπόκεινται σε κυρώσεις, ανώνυμους συνεισφέροντες σε έργα ανοιχτού κώδικα, καθώς και οποιονδήποτε δημιουργεί εργαλεία προστασίας της ιδιωτικότητας ή της ασφάλειας. Η Google έχει τεκμηριωμένο ιστορικό συμμόρφωσης με αιτήματα κυβερνήσεων για αφαίρεση εφαρμογών. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "Η δύναμη του Android ήταν η αποκεντρωμένη φύση του. Το σχέδιο της Google να επιβάλλει κεντρικό μητρώο εγγραφής για κάθε προγραμματιστή εφαρμογών καταστρέφει αυτή την αρχή. Πρέπει να αντισταθούμε σε αυτήν την κεντροποίηση της εξουσίας. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_7: "Αν αγόρασες το hardware, πρέπει να έχεις τον τελευταίο λόγο στο λογισμικό. Το σχέδιο της Google να αποκλείει μη επαληθευμένες εφαρμογές αποτελεί άμεση επίθεση στην ανεξαρτησία του χρήστη. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_8: "Φαντάσου έναν κόσμο όπου κάθε ερασιτέχνης ή εθελοντής προγραμματιστής πρέπει να εγγραφεί σε μια παγκόσμια εταιρεία απλώς και μόνο για να μοιραστεί τη δουλειά του. Αυτός είναι ο κόσμος που η Google δημιουργεί για το Android το 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_9: "Η «προηγμένη διαδικασία» της Google για την εγκατάσταση εφαρμογών από εξωτερικές πηγές είναι ένας μηχανισμός αποτροπής, όχι μία διέξοδος. 9 βήματα και αναμονή 24 ωρών για λογισμικό που σου ανήκει; Όχι ευχαριστώ. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
