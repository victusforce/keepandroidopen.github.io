social_callout_bluesky_1: "Από Σεπτέμβρη 2026, η Google θα αποκλείει κάθε Android app του οποίου ο προγραμματιστής δεν έχει εγγραφεί με ταυτότητα. Αυτό αφορά όλες τις εφαρμογές, όχι μόνο το Play Store. Το F-Droid μιλά για «υπαρξιακή απειλή». @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_2: "Η Google απαιτεί από όλους τους προγραμματιστές Android να εγγραφούν κεντρικά με ταυτότητα και να καταβάλουν ένα τέλος. Εφαρμογές από μή εγγεγραμμένους θα αποκλείονται. 67+ οργανώσεις αντιτίθενται σε αυτό. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "Μετά από 17 χρόνια ανοιχτού Android, η Google πλέον απαιτεί εγγραφή προγραμματιστών για όλες τις εφαρμογές. Ανεξάρτητοι devs, συνεισφέροντες στον ανοιχτό κώδικα και εναλλακτικά καταστήματα όπως το F-Droid έχουν αβέβαιο μέλλον. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_4: "Η λύση της Google για την εγκατάσταση μη επαληθευμένων app: 9 βήματα, 24ωρη αναμονή, Play Services (που η Google μπορεί να τροποποιήσει οποτε θέλει χωρίς συγκατάθεση). Η διαδικασία υπάρχει μόνο ως ανάρτηση σε blog. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_5: "Το EFF προειδοποιεί ότι η επαλήθευση των devs από τη Google δημιουργεί «μονοπάτι προς τη λογοκρισία». Οι devs σε ανελεύθερες χώρες, οι ανώνυμοι contributors και οι συντηρητές εργαλείων ιδιωτικότητας θα επηρεαστούν ιδιαίτερα. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_6: "Το σχέδιο της Google να αποκλείσει μη επαληθευμένες εφαρμογές είναι μια ύπουλη κίνηση εις βάρος των 3 δισ. χρηστών Android. Μην αφήσεις το κινητό σου να γίνει ένα κλειστό οικοσύστημα. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_7: "Η ιδιοκτησία συνεπάγεται έλεγχο. Αν η Google μπορεί να αποκλείσει οποιοδήποτε app από το κινητό σου, τότε αυτό δεν σου ανήκει πραγματικά. Γίνε ένας από τους 100.000+ χρήστες που αγωνίζονται να κρατήσουν το Android ανοιχτό. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Υποχρεωτική ταυτοποίηση για κάθε προγραμματιστή εφαρμογών; Αυτό είναι όνειρο για τους λογοκριτές και εφιάλτης για την ιδιωτικότητα. Προστάτεψε τον ανοιχτό ιστό και τα ανοιχτά οικοσυστήματα για κινητά. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "Η εγκατάσταση εφαρμογών από εξωτερικές πηγές δεν θα πρέπει να απαιτεί 24ωρη αναμονή και μια πολύπλοκη διαδικασία 9 βημάτων. Η «προηγμένη διαδικασία» της Google έχει σχεδιαστεί με στόχο να αποτύχει. Κρατήστε το Android ανοιχτό! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_10: "Από το F-Droid έως και τους ανεξάρτητους προγραμματιστές, ολόκληρο το οικοσύστημα του Android απειλείται από τη νέα υποχρεωτική διάταξη της Google περί εγγραφής των προγραμματιστών. Δες γιατί 67+ οργανώσεις λένε όχι: {url}"

