# act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. *Don't play ball.*"
act_dev_intro: "<strong style=\"text-transform: uppercase;\">Μην εγγραφείς.</strong> Μην μπεις στο πρόγραμμα κάνοντας εγγραφή στην Κονσόλα Προγραμματιστών Android και μην αποδεχτείς τους αμετάκλητους Όρους και Προϋποθέσεις τους. Μην επαληθεύσεις την ταυτότητά σου. *Μη μπεις στο χορό.*"
