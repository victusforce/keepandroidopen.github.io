# social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
# social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
# social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Google can modify at any time). The community is being asked to accept a blog post as a safeguard. {url}"
# social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
# social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
# social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
# social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
# social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
# social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
# social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_1: "Από τον Σεπτέμβριο του 2026, η Google θα απαιτεί από κάθε προγραμματιστή εφαρμογών Android να εγγραφεί κεντρικά και να παρέχει ταυτοποίηση που εκδίδεται από την κυβέρνηση. Οι εφαρμογές από μη εγγεγραμμένους προγραμματιστές θα μπλοκάρονται σε όλες τις πιστοποιημένες συσκευές Android παγκοσμίως. Αυτό ισχύει για όλες τις εφαρμογές, όχι μόνο για αυτές στο Play Store. Μάθε περισσότερα: {url}"
social_callout_facebook_2: "Το F-Droid, το κατάστημα εφαρμογών Android ανοιχτού κώδικα που χρησιμοποιείται από εκατομμύρια χρήστες, χαρακτηρίζει την επαλήθευση προγραμματιστών της Google ως «υπαρξιακή απειλή» για τη συνέχιση της λειτουργίας του. Περισσότεροι από 67 οργανισμοί, συμπεριλαμβανομένων των EFF, FSF και Tor Project, έχουν υπογράψει ανοιχτή επιστολή κατά της πολιτικής αυτής. Μάθε γιατί αυτό έχει σημασία: {url}"
social_callout_facebook_3: "Η προτεινόμενη εναλλακτική λύση της Google για την εγκατάσταση μη επαληθευμένων εφαρμογών μετά την εφαρμογή του lockdown απαιτεί 9 βήματα, μια υποχρεωτική αναμονή 24 ωρών και εκτελείται μέσω των Google Play Services (τα οποία η Google μπορεί να τροποποιήσει οποιαδήποτε στιγμή). Η κοινότητα καλείται να αποδεχτεί μια ανάρτηση στο blog ως μέτρο προστασίας. {url}"
social_callout_facebook_4: "Η ανοιχτή φύση του Android ήταν το βασικότερο χαρακτηριστικό του για 17 χρόνια. Εκατομμύρια το επέλεξαν αντί του iPhone ακριβώς γι’ αυτόν τον λόγο. Τώρα η Google επιβάλλει την εγγραφή των προγραμματιστών για όλες τις εφαρμογές, συμπεριλαμβανομένων αυτών που διανέμονται εκτός του Play Store. Οι ανεξάρτητοι προγραμματιστές και τα έργα ανοιχτού κώδικα επηρεάζονται περισσότερο. {url}"
social_callout_facebook_5: "Το EFF χαρακτηρίζει τον έλεγχο πρόσβασης στις εφαρμογές ως «μονοπάτι προς τη λογοκρισία». Η επαλήθευση προγραμματιστών της Google θα δώσει σε μία μόνο εταιρεία τη δυνατότητα να μπλοκάρει οποιαδήποτε εφαρμογή, από οποιονδήποτε προγραμματιστή, σε οποιαδήποτε πιστοποιημένη συσκευή παγκοσμίως. Αυτό δημιουργεί ένα παράδειγμα προς μίμηση που εκτείνεται ακόμα και πέρα από το Android, στο μέλλον της προσωπικής πληροφορικής. {url}"
social_callout_facebook_6: "Το τηλέφωνό σου, οι επιλογές σου; Όχι αν η Google πετύχει τον στόχο της. Από το 2026, σχεδιάζει να αποκλείσει οποιαδήποτε εφαρμογή ο προγραμματιστής της οποίας δεν έχει εγγραφεί και δεν έχει προσκομίσει ταυτότητα που εκδίδεται από την κυβέρνηση. Αυτό επηρεάζει τους πάντες. {url}"
social_callout_facebook_7: "Η Google κλειδώνει αναδρομικά δισεκατομμύρια συσκευές που πωλήθηκαν ως ανοιχτές πλατφόρμες. Αυτή η αθέτηση της υπόσχεσης της απειλεί τους ανεξάρτητους προγραμματιστές και τα εναλλακτικά καταστήματα εφαρμογών όπως το F-Droid. {url}"
social_callout_facebook_8: "Είναι το τηλέφωνό σου πραγματικά δικό σου; Αν η Google μπορεί να αποφασίζει ποιες εφαρμογές επιτρέπεται να εγκαταστήσεις, η απάντηση είναι όχι. Γίνε ένας από τους 100.000+ ανθρώπους που αγωνίζονται να διατηρηθεί το Android ανοιχτό. {url}"
social_callout_facebook_9: "Η διαδικασία 9 βημάτων της Google προκειμένου να «επιτραπούν» μη επαληθευμένες εφαρμογές αποτελεί παγίδα. Έχει σχεδιαστεί ώστε να είναι τόσο δύσκολη που κανείς δεν πρόκειται να τη χρησιμοποιήσει, δίνοντας στην Google τον απόλυτο έλεγχο. {url}"
social_callout_facebook_10: "Από μαθητές ή φοιτητές που δημιουργούν τις πρώτες τους εφαρμογές μέχρι και εθελοντές που αναπτύσσουν εργαλεία προστασίας προσωπικών δεδομένων, η υποχρεωτική πολιτική εγγραφής της Google θα εμποδίσει την καινοτομία. Βοήθησέ μας να κρατήσουμε το Android ανοιχτό! {url}"

