social_callout_linkedin_3: "Το πρόγραμμα επαλήθευσης προγραμματιστών της Google θα παρέχει σε μία μόνο εταιρεία τη τεχνική δυνατότητα να αποκλείει οποιαδήποτε εφαρμογή, από οποιονδήποτε προγραμματιστή, σε οποιαδήποτε πιστοποιημένη συσκευή Android παγκοσμίως. Αυτό επηρεάζει τους ανεξάρτητους προγραμματιστές, τα έργα ανοιχτού κώδικα και την αρχή ότι εσύ ελέγχεις το λογισμικό στο hardware που σου ανήκει. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "Το F-Droid εκτιμά ότι το 85% των εφαρμογών ανοιχτού κώδικα που διαθέτει ενδέχεται να αντιμετωπίσει προβλήματα διανομής λόγω των νέων κανόνων επαλήθευσης προγραμματιστών της Google. Η απαίτηση για επίσημο έγγραφο ταυτότητας και κλειδιά υπογραφής δημιουργεί εμπόδια για τους ανώνυμους συνεισφέροντες, τους προγραμματιστές σε χώρες που υπόκεινται σε κυρώσεις, καθώς και τα έργα που συντηρούνται από εθελοντές. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Η προτεινόμενη από την Google «προηγμένη διαδικασία» για την εγκατάσταση μη επαληθευμένων εφαρμογών απαιτεί 9 βήματα, μια υποχρεωτική περίοδο αναμονής 24 ωρών και εκτελείται εξ ολοκλήρου μέσω των Υπηρεσιών Google Play. Ζητήθηκε από τα μέλη της κοινότητας να αποδεχτούν μια ανάρτηση στο blog της Google ως διασφάλιση του τρόπου λειτουργίας της διαδικασίας αυτής, που δεν έχει εμφανιστεί σε καμία έκδοση beta ακόμα. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "Η ψηφιακή ανεξαρτησία βρίσκεται σε κίνδυνο. Το σχέδιο της Google να επιβάλει την υποχρεωτική εγγραφή προγραμματιστών για όλες τις εφαρμογές Android - ακόμη και για εκείνες που διανέμονται εκτός του Play Store - δημιουργεί ένα κεντρικό σημείο ελέγχου και ενδεχόμενης λογοκρισίας για 3 δισεκατομμύρια συσκευές. {url} #KeepAndroidOpen"
social_callout_linkedin_7: "Η εκστρατεία «Keep Android Open» έχει συγκεντρώσει την υποστήριξη περισσότερων από 67 οργανισμών από όλο τον κόσμο. Αντιτιθέμεθα στο σχέδιο της Google να αποκλείσει κάθε εφαρμογή της οποίας ο προγραμματιστής δεν έχει εγγραφεί στο κεντρικό μητρώο και δεν έχει προσκομίσει επίσημο έγγραφο ταυτότητας. Διαβάστε την ανοιχτή επιστολή: {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Η αναδρομική αλλαγή των κανόνων για το hardware που ήδη κατέχουν οι χρήστες αποτελεί επικίνδυνο πρότυπο. Η υποχρεωτική επαλήθευση των προγραμματιστών από την Google στερεί από τους χρήστες την ελευθερία επιλογής τους και τους αναγκάζει να ενταχθούν σε ένα ελεγχόμενο οικοσύστημα. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "Το F-Droid και το EFF έχουν κρούσει τον κώδωνα του κινδύνου: το πρόγραμμα επαλήθευσης προγραμματιστών της Google αποτελεί «υπαρξιακή απειλή» για την εναλλακτική διανομή εφαρμογών. Πρέπει να προστατεύσουμε το οικοσύστημα ανοιχτού κώδικα που δημιούργησε το Android. {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Καθώς η Google προχωράει στην περαιτέρω εδραίωση του ρόλου της ως «φρουρού», η κοινότητα αντιδρά. Η συσκευή σου πρέπει να αποτελεί ιδιοκτησία σου, όχι ένα μισθωμένο σύστημα που υπόκειται σε εκ των υστέρων περιορισμούς. Γίνε μέρος του κινήματος: {url} #KeepAndroidOpen"

# social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
