# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "Что делает Google"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
  В августе 2025 года, Google [анонсировал](https://developer.android.com/developer-verification) новое требование: начиная с сентября 2026 года, **каждый
  разработчик Android-приложений будет должен зарегистрироваться в Google** перед тем, как их ПО будет доступно для установки на любое устройство. Не только приложения из Play Store: все приложения.
  Это также имеет в виду приложения, которыми делятся среди друзей и которые распространяются через [F-Droid](https://f-droid.org), созданные любителями для личного использования.
  Независимые разработчики, церковные и общественные группы, или просто любители - все они больше не смогут разрабатывать и распространять свое программное обеспечение.
# [en] what_registration: "Registration requires:"
what_registration: "Для регистрации нужно:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Заплатить комиссию Google"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Согласиться с условиями Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Пройти верификацию документом, удостоверяющим личность"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Доказать владение приватным ключем подписи"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Предоставить все текущие и будущие идентификаторы приложений"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Если разработчики не соблюдают правила, их приложения будут заблокированы на каждом Android-устройстве по всему миру."

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "На кого это влияет"
# [en] impact_you_heading: "You"
impact_you_heading: "На Вас"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Вы купили Android-смартфон, потому что Google рассказали вам, что это открытая операционная система. Вы могли устанавливать что хотите, и это было договоренностью."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >-
  Google изменяют эту договоренность, на железе, которым вы уже владеете. После того, как обновление установится, вы сможете запускать только те приложения,
  которые Google предварительно проверили. На вашем смартфоне: *ваше* имущество, за которые вы заплатили.
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "На независимых разработчиков"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: >-
  Первое приложение подростка, инструмент обеспечения приватности от волонтеров, или внутренние конфиденциальные бета-версии приложений компаний.
  Это не имеет значения. После сентября 2026 года, ничего из этого может быть установлено без одобрения Google.
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), дом для тысяч бесплатных Android-приложений с открытым исходным кодом, назвал это [экзистенциальной угрозой](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Кори Доктороу называет это ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "На правительства и гражданские общества"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
  У Google есть задокументированный опыт удаления приложений по требованию авторитарных режимов.
  С этой программой ПО, на котором работают государственные институты вашей страны, будет полностью зависеть от воли одной неподотчётной иностранной компании.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  [EFF называет](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) контроль доступа к приложениям
  "бесконечно расширяющимся" путем к цензуре интернета.

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "\"Запасной люк\" от Google - это ловушка"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  Google говорит, что [продвинутые пользователи](https://android-developers.googleblog.com/2026/03/android-developer-verification.html)
  смогут устанавливать неподтвержденные приложения. Вот как это выглядит *на самом деле*:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Откройте Системные Настройки, найдите Настройки Разработчика"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Нажмите на номер сборки **семь раз**, чтобы включить Режим Разработчика"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Пропустите устрашающие предупреждения"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Введите PIN-код"
# [en] flow_step5: "Restart the device"
flow_step5: "Перезагрузите устройство"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Подождите 24 часа**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Вернитесь и пропустите еще больше устрашающих предупреждений"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Выберите: \"разрешить временно\" (7 дней) или \"разрешить бессрочно\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Подтвердите еще раз, что вы осознаете все \"риски\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "9 шагов. Обязательный 24-часовой период ожидания. *Для установки приложения на устройство, которым Вы владеете*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: "Хуже: этот процесс происходит полностью через **сервисы Google Play**, а не Android. Google могут изменять, затягивать или полностью убить его в любое время, без обновления системы и согласия."

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Это - больше, чем Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Если Google задним числом начнет ограничивать миллиарды устройств, которые были проданы как свободные платформы, каждый производитель оборудования будет наблюдать за этим."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: >-
  Установленный принцип: производитель вашего устройства может решать, какие приложения вам разрешено запускать, после того как вы купили устройство. В сфере разработки ПО это называется "rug pull";
  но по крайней мере вы всегда могли устанавливать конкурирующие приложения. В сфере железа, это *fait accompli* который лишает вас выбора и делает вас бессильными перед желаниями
  единственного неподотчетного и осужденного монополиста, контролирующего доступ к приложениям.
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: >-
  Открытость Android никогда не было просто особенностью. Это было *обещание*, которое отличало его от iPhone. Миллионы людей выбрали Android именно по этой причине.
  Теперь Google отзывает это обещание...
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/):
  *"Зависть Google к Apple угрожает разрушением наследия открытости Android."*

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Но подождите, разве это не..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...о безопасности?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
  Основание безопасности - это просто попытка скрыть правду. Google Play Protect уже сканирует вирусы независимо от разработчика. Требование паспорта не делает код безопаснее. Это делает *разработчиков*
  идентифицируемыми и контроллируемыми. Авторы вирусов тоже могут зарегистрироваться. Инди разработчики или диссиденты - часто не могут.
  [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) говорит прямо - контроль доступа по личности это инструмент
  контроля, а не безопасности.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...все еще доступен sideloading если вы продвинутый пользователь?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
  Девять шагов, 24-часовое ожидание, закопанное в настройках разработчика, предоставленное через проприетарный сервис, который Google может отключить когда они хотят. Это не sideloading.
  Это механизм сдерживания, построенный для того, чтобы убедиться что никто не может пройти его. И когда он работает через сервисы Google Play, а не операционную систему,
  Google может незаметно затянуть или выключить это.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...проблема только если у вас есть что скрывать?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
  Информаторы, журналисты и активисты в авторитарных правительствах будут первыми жертвами. Люди, оказавшиеся в ситуациях домашнего насилия будут следующими. Все эти группы имеют законные причины
  использовать или распространять программное обеспечение без отправки их правовой идентичности в базу данных Google. Анонимные вклады в проекты с открытым исходным кодом это традиция,
  которая старше чем сама Google. Эта политика больше не работает в Android.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...то же самое, что делает Apple?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
  Apple была "ограниченным садом" с первого дня. Люди выбирали Android *потому что* он отличается. "Apple делает то же самое" - это гонка к низу и слабый аргумент *tu quoque*.
  И под давлением регуляций (EU Digital Markets Act), даже Apple заставили открыться. Google двигается в противоположном направлении - попытка еще больше укрепить свой статус
  контролирующего.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...только $25 и немного документов?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
  Может быть, если вы разработчик из США с кредитной картой и водительским удостоверением. Попробуйте побыть студентом из Африки или диссидентом из Мьянмы, или волонтером
  обслуживающим приложение для охраны здоровья населения. Цена не только финансовая; вы сдаете свой государственный ID и доказательство ваших ключей подписи в компанию,
  которая [регулярно следует](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) государственным
  требованиям удалять приложения и раскрывать их разработчиков.

# Fight back
# [en] act_heading: "Fight back"
act_heading: "Дадим отпор"
# [en] act_everyone_heading: "Everyone"
act_everyone_heading: "Все"
# [en] act_fdroid: "**[Install F-Droid](https://f-droid.org)** on every Android device you own. Alternative stores only survive if people actually use them."
act_fdroid: "**[Установите F-Droid](https://f-droid.org)** на каждое Android-устройство, которым вы владеете. Альт-сторы могут выжить только если ими пользуются."
# [en] act_regulators: "**[Contact your regulators.](/cta/#consumers)** Regulators worldwide are genuinely concerned about monopolies and the centralization of power in the tech sector, and want to hear directly from individuals who are affected and concerned."
act_regulators: >- 
  **[Свяжитесь с вашими регулирующими органами.](/cta/#consumers)** Регуляторы по всему миру действительно обеспокоены о монополистах и их силой централизации в
  технологическом секторе, и хотят услышать от отдельных лиц, на кого это влияет и кто об этим беспокоится
# [en] act_share: "**Share this page.** Link to [keepandroidopen.org](https://keepandroidopen.org) everywhere."
act_share: "**Распространите эту страницу.** Оставляйте ссылки на [keepandroidopen.org](https://keepandroidopen.org) везде."
# [en] act_astroturf: "**Push back on astroturfers.** The \"well, actually...\" crowd is out in force. Don't let them set the narrative."
act_astroturf: "**Давайте отпор их поддержке.** Народ \"ну, вообще-то\" собрался в большом количестве. Не дайте им определять ход событий."
# [en] act_petition: "**[Sign the change.org petition](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** and join the over 100,000 signatories who have made their voices heard."
act_petition: >-
  **[Подпишите петицию на change.org](https://www.change.org/p/stop-google-from-limiting-apk-file-usage/)** и присоединяйтесь к более чем 100,000
  подписавшим, голоса которых стали услышанными.
# [en] act_letter: "**[Read and share our open letter](/open-letter)**"
act_letter: "**[Прочитайте и распространите наше публичное письмо](/open-letter)**"
# [en] act_survey: "**Tell Google what you think of this** through their own [developer verification survey](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(for all the good that will do)</small>."
act_survey: >-
  **Расскажите Google что вы думаете об этом** через их собственный [опрос по верификации разработчиков](https://docs.google.com/forms/d/e/1FAIpQLSfN3UQeNspQsZCO2ITkdzMxv81rJDEGGjO-UIDDY28Rz_GEVA/viewform?pli=1) <small>(если от этого будет смысл)</small>
# [en] act_dev_heading: "Developers"
act_dev_heading: "Разработчики"
# [en] act_dev_intro: "<strong style=\"text-transform: uppercase;\">Do not sign up.</strong> Don't join the program by signing up for the Android Developer Console and agreeing to their irrevocable Terms and Conditions. Don't verify your identity. *Don't play ball.*"
act_dev_intro: >-
  <strong style="text-transform: uppercase;">Не регистрируйтесь.</strong> Не присоединяйтесь к этой программе регистрацией в Android Developer Console и соглашением с их
  безотзывными условиями. Не подтверждайте свою личность.
# [en] act_dev_resist: "Google's plan only works if developers comply. Don't."
act_dev_resist: "План Google работает только если разработчики следуют ему. Не делайте так."
# [en] act_dev_talk: "Talk other developers and organizations out of signing up."
act_dev_talk: "Отговорите других разработчиков от регистрации."
# [en] act_dev_warn: "Add the [FreeDroidWarn library](https://github.com/woheller69/FreeDroidWarn) to your apps to warn users."
act_dev_warn: "Добавьте [библиотеку FreeDroidWarn](https://github.com/woheller69/FreeDroidWarn), чтобы предупредить пользователей вашего приложения."
# [en] act_dev_banner: "Run a website? [Add the countdown banner.](/banner)"
act_dev_banner: "Владеете веб-сайтом? [Добавьте баннер с обратным отсчетом](/banner)"
# [en] act_google_heading: "Google employees"
act_google_heading: "Сотрудники Google"
# [en] act_google_text: "If you know something about the program's technical implementation or internal rationale, contact [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org) from a *non-work* machine and a *non-Gmail* account. Strict confidence guaranteed."
act_google_text: >-
  Если вы знаете что-нибудь о технической реализации или внутренней логике, свяжитесь с нами через [tips@keepandroidopen.org](mailto:tips@keepandroidopen.org)
  с *не с рабочего компьютера* и *не с Gmail-аккаунта*. Конфиденциальность гарантирована.

