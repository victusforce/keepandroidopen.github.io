# Social share messages (rotated randomly; {url} is replaced at build time)
# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "C сентября 2026, Гугл будет блокировать любые приложения для Android, разработчик которых не зарегистрировался и не предоставил удостоверение личности. Это затронет все устройства Android по всему миру. Подробнее:{url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google объявили, что разработчики для Android должны зарегистрироваться, оплатить сбор и показать паспорт, иначе их приложения будут заблокированы на всех устройствах. Более 67 организаций выступают против этого. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "Открытость Android отличала его от iPhone на протяжении 17 лет. Теперь Google требует обязательной регистрации разработчиков для всех приложений, включая те, которые распространяются вне Play Store. {url} #KeepAndroidOpen"
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid, магазин Android-приложений с открытым кодом называет проверку разработчиков Google «экзистенциальной угрозой» для альтернативных способов распространения приложений. EFF предупреждает, что это приведёт к цензуре. {url} #KeepAndroidOpen"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "Предложенный Google способ установки непроверенных приложений требует 9 шагов, 24-часового ожидания и работает через Play Services, которые Google может изменять в любое время. Он ещё не был включен ни в одну бета-версию. {url} #KeepAndroidOpen"
# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: "Нам продавали Android как открытую платформу. Теперь Google хочет, чтобы каждый разработчик регистрировался и предоставлял свои данные, чтобы вы могли устанавливать их приложения. Не позволяйте на*ть 3 млрда пользователей. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: "Если вы купили телефон, вы его хозяин. Новая система «проверки разработчиков» от Google означает, что это они решают, какие приложения вам разрешено запускать на вашем телефоне. Присоединяйтесь к петиции против этого:{url} #KeepAndroidOpen"
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: "Google превращает Android в закрытую экосистему. Обязательная идентификация, регистрационные сборы и 9-шаговый «расширенный процесс» для установки приложений из сторонних источников? Это не безопасность, это монополизация. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_9: "What happens to the student's first app, or the privacy tool built by a volunteer? Google's mandatory registration blocks them all by default unless they play by Google's rules. {url} #KeepAndroidOpen"
social_callout_x_9: "Что станет с первым приложением студента или инструментом обеспечения конфиденциальности, разработанным волонтером? Обязательная регистрация в Google блокирует их все по умолчанию, если они не соблюдают правила Google. {url} #KeepAndroidOpen"
# [en] social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_10: "17 лет открытости Android под угрозой. План Google по блокировке непроверенных приложений - прямой удар по F-Droid и независимому программному обеспечению. Остановите блокировку: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "С сентября 2026 года Google потребует от каждого разработчика приложений для Android централизованной регистрации и предоставления удостоверения личности государственного образца, прежде чем их программное обеспечение можно будет установить на любое устройство. Это касается всех приложений, а не только тех, что в Play Store. Более 67 организаций подписали открытое письмо против этой политики. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Открытость Android была его отличительной чертой на протяжении почти двух десятилетий. Теперь Google вводит обязательную регистрацию разработчиков для всех приложений Android, включая те, которые распространяются через альтернативные магазины, такие как F-Droid. EFF, FSF, Tor Project и десятки других организаций выражают серьёзную обеспокоенность. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Программа проверки разработчиков Google даст одной компании техническую возможность блокировать любое приложение от любого разработчика на любом сертифицированном устройстве Android по всему миру. Это затрагивает независимых разработчиков, проекты с открытым исходным кодом и сам принцип, согласно которому вы контролируете программное обеспечение на принадлежащем вам оборудовании. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "По оценкам F-Droid, 85% их приложений с открытым исходным кодом могут столкнуться с проблемами распространения в соответствии с новыми правилами проверки разработчиков Google. Требование удостоверения личности и ключей подписи создаёт барьеры для анонимных участников, разработчиков из стран под санкциями и проектов, поддерживаемых волонтёрами. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Предложенный Google «расширенный процесс» для установки непроверенных приложений требует 9 шагов, обязательного 24-часового ожидания и полностью зависит от Google Play Services. Сообществу предложили принять запись в блоге в качестве гарантии. Ни в одной бета-версии он так и не появился. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps-even those distributed outside the Play Store-creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "На кону цифровой суверенитет. План Google по введению обязательной регистрации разработчиков для всех приложений Android - даже тех, что распространяются вне Play Store - создаёт центральную точку контроля и потенциальной цензуры для 3 миллиардов устройств. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "Кампания «Сохраним Android открытым» получила поддержку более 67 организаций по всему миру. Мы выступаем против плана Google блокировать любое приложение, разработчик которого не зарегистрировался централизованно и не предоставил удостоверение личности. Читайте открытое письмо: {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Ретроактивное изменение правил для оборудования, которое уже находится в собственности у людей, - опасный прецедент. Обязательная проверка разработчиков Google лишает пользователей их прав и загоняет их в управляемую экосистему. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid и EFF бьют тревогу: программа проверки разработчиков Google представляет собой «экзистенциальную угрозу» для альтернативного распространения приложений. Мы должны защитить экосистему открытого исходного кода, на которой построен Android. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Пока Google пытается ещё больше укрепить свой статус «привратника», сообщество даёт отпор. Ваше устройство должно быть вашей собственностью, а не арендованным терминалом, подпадающим под ретроактивные ограничения. Присоединяйтесь к движению: {url} #KeepAndroidOpen"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_1: "С сентября 2026 года Google заблокирует любое Android-приложение, чей разработчик не зарегистрирован и не предоставил удостоверение. Касается всех приложений, не только из Play Store. F-Droid: «экзистенциальная угроза». @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_2: "Google is requiring all Android developers to register centrally, pay a fee, and submit government ID. Apps from unregistered developers will be silently blocked. over 67 organizations oppose this. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_2: "Google требует, чтобы все разработчики Android регистрировались, платили сбор и подавали удостоверение. Приложения от незарегистрированных будут заблокированы. Более 67 организаций против. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_3: "After 17 years of marketing Android as an open platform, Google is mandating developer registration for all apps. Independent developers, open-source contributors, and alternative stores like F-Droid face an uncertain future. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "После 17 лет позиционирования Android как открытой платформы, Google вводит обязательную регистрацию для всех. Независимых разработчиков, open-source и магазины как F-Droid ждёт неопределённость. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_4: "Google's proposed workaround for installing unverified apps: 9 steps, a 24-hour wait, delivered through Play Services (which Google can change at any time without consent). It exists only as a blog post. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_4: "Обходной путь Google для непроверенных приложений: 9 шагов, 24 часа ожидания, через Play Services (которые Google может изменить). Существует только в блоге. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_5: "The EFF warns that Google's developer verification creates \"a pathway to censorship.\" Developers in restrictive countries, anonymous open-source contributors, and privacy tool maintainers are among those most affected. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_5: "EFF предупреждает, что проверка разработчиков Google создаёт «путь к цензуре». Разработчики в странах с ограничениями, анонимные участники open-source и создатели инструментов для приватности - среди тех, кто пострадает больше всего. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_6: "Google's plan to block unverified apps is a 'rug pull' on the 3 billion people who chose Android for its openness. Don't let them turn your phone into a walled garden. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_6: "План Google по блокировке непроверенных приложений - это «кидалово» 3 миллиардов человек, которые выбрали Android за его открытость. Не позволяйте им превратить ваш телефон в закрытый сад. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_7: "Ownership means control. If Google can block any app on your phone, you don't really own it. Join the 100,000+ people fighting to keep Android open. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_7: "Собственность означает контроль. Если Google может блокировать любое приложение на вашем телефоне, он вам на самом деле не принадлежит. Присоединяйтесь к 100 000+ человек, борющихся за открытость Android. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_8: "Mandatory ID registration for every app developer? This is a dream for censors and a nightmare for privacy. Protect the open web and open mobile. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Обязательная регистрация с удостоверением личности для каждого разработчика приложений? Это мечта для цензоров и кошмар для приватности. Защитим открытый веб и открытый мобильный интернет. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_9: "Sideloading shouldn't require a 24-hour waiting period and a 9-step gauntlet. Google's 'advanced flow' is designed to fail. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "Установка из сторонних источников не должна требовать 24-часового ожидания и 9 шагов. «Расширенный процесс» Google спроектирован так, чтобы люди им не пользовались. Сохраним Android открытым! @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_10: "From F-Droid to independent devs, the entire Android ecosystem is under threat from Google's new mandatory registration decree. See why 67+ orgs are saying no: {url}"
social_callout_bluesky_10: "От F-Droid до независимых разработчиков - вся экосистема Android под угрозой из-за нового указа Google об обязательной регистрации. Узнайте, почему 67+ организаций говорят «нет»: {url}"
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: "С сентября 2026 года Google потребует от каждого разработчика приложений для Android централизованной регистрации, предоставления удостоверения личности и ключей подписи. Приложения от незарегистрированных разработчиков будут заблокированы на всех сертифицированных устройствах по всему миру. Это угрожает F-Droid, распространению open-source и автономии пользователей. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Программа проверки разработчиков Android от Google требует удостоверение личности, ключи подписи и оплату сбора от любого разработчика, желающего, чтобы его ПО можно было установить на Android. EFF называет контроль за приложениями «путём к цензуре». Более 67 организаций подписали открытое письмо протеста. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_3: "F-Droid, home to thousands of free and open-source Android apps, calls Google's developer verification an \"existential threat.\" An estimated 85% of F-Droid apps could face distribution issues because their developers signed through F-Droid, not through Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, дом для тысяч бесплатных и открытых приложений для Android, называет проверку разработчиков Google «экзистенциальной угрозой». По оценкам, 85% приложений F-Droid могут столкнуться с проблемами распространения, потому что их разработчики подписали их через F-Droid, а не через Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_4: "Google's proposed workaround for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and is delivered through Google Play Services, not the Android OS. Google can modify or remove it at any time without user consent. It hasn't shipped in any beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Предложенный Google обходной путь для установки непроверенных приложений требует 9 шагов, обязательного 24-часового ожидания и реализован через Google Play Services, а не через ОС Android. Google может изменить или удалить его в любое время без согласия пользователя. Он не был включён ни в одну бета-версию. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_5: "The mandatory developer registration Google is imposing on Android raises concerns for developers in sanctioned countries, anonymous open-source contributors, and anyone building privacy or security tools. Google has a documented history of complying with government demands to remove apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "Обязательная регистрация разработчиков, навязываемая Google для Android, вызывает обеспокоенность у разработчиков в странах под санкциями, анонимных участников open-source и всех, кто создаёт инструменты для приватности или безопасности. У Google есть задокументированная история выполнения требований правительств об удалении приложений. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_6: "Android's strength was its decentralized nature. Google's plan to mandate central registration for every single app developer destroys that. We must resist this centralization of power. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "Сила Android была в его децентрализованной природе. План Google по введению обязательной центральной регистрации для каждого разработчика приложений разрушает это. Мы должны противостоять этой централизации власти. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_7: "If you bought the hardware, you should have the final say on the software. Google's plan to block unverified apps is a direct attack on user sovereignty. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_7: "Если вы купили оборудование, последнее слово в выборе ПО должно быть за вами. План Google по блокировке непроверенных приложений - прямая атака на суверенитет пользователя. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_mastodon_8: "Imagine a world where every small hobbyist or volunteer dev has to register with a global corporation just to share their work. That's the world Google is building for Android in 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_8: "Представьте мир, в котором каждый маленький энтузиаст или разработчик-волонтёр должен зарегистрироваться в глобальной корпорации, просто чтобы поделиться своей работой. Именно такой мир строит Google для Android в 2026 году. {url} @keepandroidopen@techhub.social"
# [en] social_callout_mastodon_9: "Google's 'advanced flow' for sideloading is a deterrence mechanism, not an escape hatch. 9 steps and a 24-hour wait for software you own? No thanks. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_9: "«Расширенный процесс» Google для установки из сторонних источников - это механизм сдерживания, а не запасной выход. 9 шагов и 24 часа ожидания для ПО, которое вам принадлежит? Нет уж, спасибо. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_10: "Over 100,000 people and 67+ organizations are standing up to Google's attempt to lock down Android. Join the fight for a truly open mobile ecosystem. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_10: "Более 100 000 человек и 67+ организаций противостоят попытке Google запереть Android. Присоединяйтесь к борьбе за по-настоящему открытую мобильную экосистему. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
social_callout_facebook_1: "С сентября 2026 года Google потребует от каждого разработчика приложений для Android централизованной регистрации и предоставления удостоверения личности государственного образца. Приложения от незарегистрированных разработчиков будут заблокированы на всех сертифицированных устройствах Android по всему миру. Это касается всех приложений, а не только тех, что в Play Store. Узнать больше: {url}"
# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
social_callout_facebook_2: "F-Droid, магазин Android-приложений с открытым кодом, используемый миллионами, называет проверку разработчиков Google «экзистенциальной угрозой» для своего дальнейшего существования. Более 67 организаций, включая EFF, FSF и Tor Project, подписали открытое письмо против этой политики. Узнайте, почему это важно: {url}"
# [en] social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Google can modify at any time). The community is being asked to accept a blog post as a safeguard. {url}"
social_callout_facebook_3: "Предложенный Google обходной путь для установки непроверенных приложений после введения блокировки требует 9 шагов, обязательного 24-часового ожидания и реализован через Google Play Services (которые Google может изменить в любое время). Сообществу предлагают принять запись в блоге в качестве гарантии. {url}"
# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
social_callout_facebook_4: "Открытость Android была его определяющей характеристикой на протяжении 17 лет. Миллионы людей выбрали его вместо iPhone именно по этой причине. Теперь Google вводит обязательную регистрацию разработчиков для всех приложений, включая те, которые распространяются вне Play Store. Сильнее всего пострадают независимые разработчики и проекты с открытым исходным кодом. {url}"
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
social_callout_facebook_5: "EFF называет контроль за приложениями «путём к цензуре». Проверка разработчиков Google даст одной компании возможность блокировать любое приложение от любого разработчика на любом сертифицированном устройстве по всему миру. Это создаёт прецедент, который выходит за рамки Android и влияет на будущее персональных вычислений. {url}"
# [en] social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
social_callout_facebook_6: "Ваш телефон - ваш выбор? Только не в том случае, если Google добьётся своего. Начиная с 2026 года они планируют блокировать любое приложение, разработчик которого не зарегистрировался и не предоставил удостоверение личности. Это касается всех. {url}"
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: "Google ретроактивно запирает миллиарды устройств, которые продавались как открытые платформы. Это «кидалово» угрожает независимым разработчикам и альтернативным магазинам приложений, таким как F-Droid. {url}"
# [en] social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
social_callout_facebook_8: "Ваш телефон действительно ваш? Если Google может решать, какие приложения вам разрешено устанавливать, то ответ - нет. Присоединяйтесь к 100 000+ человек, сражающихся за открытость Android. {url}"
# [en] social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
social_callout_facebook_9: "9-шаговый процесс Google для «разрешения» непроверенных приложений - это ловушка. Он спроектирован настолько сложным, что никто не будет им пользоваться, отдавая Google полный контроль. {url}"
# [en] social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_10: "От студентов, создающих свои первые приложения, до волонтёров, разрабатывающих инструменты для приватности - политика обязательной регистрации Google заморозит инновации. Помогите нам сохранить Android открытым! {url}"
