# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
social_callout_facebook_4: "La libertad de Android ha sido su característica distintiva durante 17 años. Millones de personas lo eligieron en lugar del iPhone precisamente por esa razón. Ahora, Google exige el registro de los desarrolladores para todas las aplicaciones, incluidas aquellas que se distribuyen fuera de Play Store. Los desarrolladores independientes y los proyectos de código abierto son los más afectados. {url}"
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
social_callout_facebook_5: "La EFF califica el control de acceso a las aplicaciones como \"el camino hacia la censura\". El proceso de verificación de desarrolladores de Google otorgaría a una sola empresa la capacidad de bloquear cualquier aplicación, de cualquier desarrollador, en cualquier dispositivo certificado en todo el mundo. Esto sienta un precedente que va más allá de Android y afecta al futuro de la informática personal. {url}"
