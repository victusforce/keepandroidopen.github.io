# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "Desde septiembre de 2026, Google bloqueará cualquier app Android cuyos desarrolladores no estén registrados ni hayan dado identificación. Afecta a todos los dispositivos Android. Más: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google: todos los desarrolladores de apps Android deberán registrarse, pagar una tasa y mostrar identificación, o sus apps serán bloqueadas. Más de 67 organizaciones se oponen. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "La libertad en Andorid lo distinguió de iPhone por 17 años. Google ahora está requiriendo registro obligatorio para todas las aplicaciones, incluyendo aquellas fuera de la Play Store. {url} #KeepandroidOpen" 
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid, la tienda Android de código abierto, llama la verificación de desarrolladores de Google una \"amenaza existencial\" para la distribución alternativa. La EFF advierte que abre un camino a la censura. {url} #KeepAndroidOpen"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "La solución de Google para apps sin verificar: 9 pasos, espera de 24h, vía Servicios de Google Play (Google puede modificarlos). Nunca se ha incluido en una beta. {url} #KeepAndroidOpen"
# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: "Nos vendieron Android como plataforma abierta. Ahora Google quiere que todos los desarrolladores se registren e identifiquen solo para instalar sus apps. No dejemos que estafen a 3000M de usuarios. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: "Si compraste tu teléfono, debería ser tuyo. La \"verificación de desarrolladores\" de Google significa que ellos deciden qué software puedes ejecutar. Únete a 100k+ firmantes contra esto: {url} #KeepAndroidOpen"
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: "Google convierte Android en un jardín amurallado. ¿ID obligatoria, cuotas y un \"proceso avanzado\" de 9 pasos para apps externas? No es seguridad, es una maniobra de monopolio. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_9: "¿Qué pasa con la primera aplicación de un estudiante o con la herramienta de privacidad creada por un voluntario? El registro obligatorio de Google las bloquea todas de forma predeterminada, a menos que sigan las reglas de Google. {url} #KeepAndroidOpen"
# [en] social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_10: "17 años de apertura de Android están en peligro. El plan de Google de bloquear las aplicaciones no verificadas supone un golpe directo a F-Droid y al software independiente. Detengamos este cierre: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "A partir de septiembre de 2026, Google exigirá a todos los desarrolladores de aplicaciones para Android que se registren de forma centralizada y presenten un documento de identidad oficial antes de que su software pueda instalarse en cualquier dispositivo. Esto se aplica a todas las aplicaciones, no solo a las que se encuentran en Play Store. Más de 67 organizaciones han firmado una carta abierta en contra de esta política. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "El programa de verificación de desarrolladores de Google otorgaría a una sola empresa la capacidad técnica de bloquear cualquier aplicación, de cualquier desarrollador, en cualquier dispositivo Android certificado en todo el mundo. Esto afecta a los desarrolladores independientes, a los proyectos de código abierto y al principio de que tú controlas el software en el hardware que posees. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid calcula que el 85 % de sus aplicaciones de código abierto podrían tener problemas de distribución debido a las nuevas normas de verificación de desarrolladores de Google. El requisito de presentar un documento de identidad oficial y claves de firma supone un obstáculo para los colaboradores anónimos, los desarrolladores de países sujetos a sanciones y los proyectos mantenidos por voluntarios. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "El \"flujo avanzado\" propuesto por Google para la instalación paralela (o sideloading) de aplicaciones no verificadas requiere nueve pasos, un período de espera obligatorio de 24 horas y se ejecuta íntegramente a través de Servicios de Google Play. Se ha pedido a la comunidad que acepte una entrada de blog como medida de seguridad funcional. No ha aparecido en ninguna versión beta. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "La campaña \"Keep Android Open\" ha recibido el apoyo de más de 67 organizaciones de todo el mundo. Nos oponemos al plan de Google de bloquear cualquier aplicación cuyo desarrollador no se haya registrado de forma centralizada y haya proporcionado un documento de identidad oficial. Lee la carta abierta: {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Cambiar retroactivamente las reglas para el hardware que la gente ya tiene sienta un precedente peligroso. La verificación obligatoria de desarrolladores impuesta por Google priva a los usuarios de su autonomía y los obliga a entrar en un ecosistema controlado. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid y la EFF han dado la voz de alarma: el programa de verificación de desarrolladores de Google supone una \"amenaza existencial\" para la distribución alternativa de aplicaciones. Debemos proteger el ecosistema de código abierto que dio origen a Android. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Mientras Google se dispone a consolidar aún más su papel de guardián, la comunidad está plantando cara. Tu dispositivo debería ser de tu propiedad, no un terminal alquilado sujeto a restricciones retroactivas. Únete al movimiento: {url} #KeepAndroidOpen"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
