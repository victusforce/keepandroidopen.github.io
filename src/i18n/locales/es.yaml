# [en] social_callout_bluesky_5: "The EFF warns that Google's developer verification creates \"a pathway to censorship.\" Developers in restrictive countries, anonymous open-source contributors, and privacy tool maintainers are among those most affected. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_5: "La EFF advierte que la verificación de desarrolladores de Google abre \"el camino a la censura\". Desarrolladores en países restrictivos, colaboradores anónimos open-source y autores de herramientas de privacidad son los más afectados. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_6: "Google's plan to block unverified apps is a 'rug pull' on the 3 billion people who chose Android for its openness. Don't let them turn your phone into a walled garden. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_6: "El plan de Google de bloquear las aplicaciones no verificadas es una **estafa** para los 3000 millones de personas que eligieron Android por su apertura. No dejes que conviertan tu teléfono en un jardín amurallado. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_7: "Ownership means control. If Google can block any app on your phone, you don't really own it. Join the 100,000+ people fighting to keep Android open. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_7: "La propiedad implica control. Si Google puede bloquear cualquier aplicación en tu teléfono, en realidad no es tuyo. Únete a las más de 100 000 personas que luchan por mantener Android abierto. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_8: "Mandatory ID registration for every app developer? This is a dream for censors and a nightmare for privacy. Protect the open web and open mobile. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "¿Registro obligatorio de identidad para todos los desarrolladores de aplicaciones? Esto es un sueño para los censores y una pesadilla para la privacidad. Protejamos la web abierta y los dispositivos móviles abiertos. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_9: "Sideloading shouldn't require a 24-hour waiting period and a 9-step gauntlet. Google's 'advanced flow' is designed to fail. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "La instalación lateral (o sideloading) no debería requerir un período de espera de 24 horas ni un proceso de nueve pasos. El \"flujo avanzado\" de Google está diseñado para fallar. ¡Mantengamos Android abierto! @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_10: "From F-Droid to independent devs, the entire Android ecosystem is under threat from Google's new mandatory registration decree. See why 67+ orgs are saying no: {url}"
social_callout_bluesky_10: "Desde F-Droid hasta los desarrolladores independientes, todo el ecosistema de Android se ve amenazado por la nueva normativa de registro obligatorio de Google. Descubre por qué más de 67 organizaciones se oponen: {url}"
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: "Desde septiembre de 2026, Google exigirá a los desarrolladores Android registrarse, dar identificación oficial y enviar claves de firma. Las apps de no registrados serán bloqueadas en todos los dispositivos certificados. Amenaza para F-Droid, la distribución de código abierto y la autonomía de los usuarios. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "El programa de verificación de desarrolladores de Android de Google exige un documento de identidad oficial, claves de firma y el pago de una cuota a cualquier desarrollador que desee que su software se pueda instalar en Android. La EFF califica el control de acceso a las aplicaciones como «una vía hacia la censura». Más de 67 organizaciones han firmado una carta abierta en contra. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_3: "F-Droid, home to thousands of free and open-source Android apps, calls Google's developer verification an \"existential threat.\" An estimated 85% of F-Droid apps could face distribution issues because their developers signed through F-Droid, not through Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, que alberga miles de aplicaciones gratuitas y de código abierto para Android, califica la verificación de desarrolladores de Google como una \"amenaza existencial\". Se estima que el 85 % de las aplicaciones de F-Droid podrían tener problemas de distribución porque sus desarrolladores se registraron a través de F-Droid, y no a través de Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_4: "Google's proposed workaround for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and is delivered through Google Play Services, not the Android OS. Google can modify or remove it at any time without user consent. It hasn't shipped in any beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "La \"solución alternativa\" propuesta por Google para instalar aplicaciones no verificadas requiere nueve pasos y un período de espera obligatorio de 24 horas, y se implementa a través de Servicios de Google Play, no del sistema operativo Android. Google puede modificarla o eliminarla en cualquier momento sin el consentimiento del usuario. No se ha incluido en ninguna versión beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_5: "The mandatory developer registration Google is imposing on Android raises concerns for developers in sanctioned countries, anonymous open-source contributors, and anyone building privacy or security tools. Google has a documented history of complying with government demands to remove apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "El registro obligatorio de desarrolladores que Google está imponiendo en Android preocupa a los desarrolladores de países sometidos a sanciones, a colaboradores anónimos de código abierto y a cualquiera que cree herramientas de privacidad o seguridad. Google tiene un historial documentado de cumplir con las exigencias gubernamentales de retirar aplicaciones. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_6: "Android's strength was its decentralized nature. Google's plan to mandate central registration for every single app developer destroys that. We must resist this centralization of power. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "El punto fuerte de Android era su naturaleza descentralizada. El plan de Google de imponer un registro centralizado para todos y cada uno de los desarrolladores de aplicaciones acaba con eso. Debemos resistirnos a esta centralización del poder. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_7: "If you bought the hardware, you should have the final say on the software. Google's plan to block unverified apps is a direct attack on user sovereignty. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_7: "Si has comprado el hardware, deberías tener la última palabra sobre el software. El plan de Google de bloquear las aplicaciones no verificadas es un ataque directo a la soberanía del usuario. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_mastodon_8: "Imagine a world where every small hobbyist or volunteer dev has to register with a global corporation just to share their work. That's the world Google is building for Android in 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_8: "Imagina un mundo en el que cualquier aficionado o desarrollador voluntario tenga que registrarse en una multinacional solo para compartir su trabajo. Ese es el mundo que Google está construyendo para Android en 2026. {url} @keepandroidopen@techhub.social"
# [en] social_callout_mastodon_9: "Google's 'advanced flow' for sideloading is a deterrence mechanism, not an escape hatch. 9 steps and a 24-hour wait for software you own? No thanks. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_9: "El \"flujo avanzado\" de Google para la instalación paralela es un mecanismo disuasorio, no una vía de escape. ¿Nueve pasos y una espera de 24 horas para un software que ya es tuyo? No, gracias. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_10: "Over 100,000 people and 67+ organizations are standing up to Google's attempt to lock down Android. Join the fight for a truly open mobile ecosystem. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_10: "Más de 100 000 personas y más de 67 organizaciones se están oponiendo al intento de Google de restringir Android. Únete a la lucha por un ecosistema móvil verdaderamente abierto. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
social_callout_facebook_1: "A partir de septiembre de 2026, Google exigirá a todos los desarrolladores de aplicaciones para Android que se registren de forma centralizada y proporcionen un documento de identidad oficial. Las aplicaciones de desarrolladores no registrados serán bloqueadas en todos los dispositivos Android certificados del mundo. Esto se aplica a todas las aplicaciones, no solo a las que se encuentran en Play Store. Más información: {url}"
# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
