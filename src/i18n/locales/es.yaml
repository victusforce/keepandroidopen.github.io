# [en] open_letter_cta: "Read our open letter opposing the Android Developer Verification program"
open_letter_cta: "Lea nuestra carta abierta contra el programa de verificación de desarrolladores de Android"
# [en] hero_lede: "Your phone is about to stop being yours."
hero_lede: "Tu teléfono está a punto de dejar de ser tuyo."
# [en] hero_countdown_label: "days until lockdown"
hero_countdown_label: "días hasta el apagón"
# [en] hero_sub: "Starting September 2026, a silent update, nonconsensually pushed by Google, will **block every Android app** whose developer hasn't registered with Google, signed their contract, paid up, and handed over government ID."
hero_sub: >-
  Comenzando en septiembre de 2026, una actualización silenciosa, no consensuada, pusheada por Google, **bloqueará cada app de Android** cuyo desarrollador no se haya registrado en Google, firmado su contrato, pagado su cuota y entregado un documento de identidad nacional.
# [en] hero_kicker: "Every app and every device, worldwide, with no opt-out."
hero_kicker: "Cada app y cada dispositivo, mundialmente, sin excepción."
# [en] what_heading: "What Google is doing"
what_heading: "Qué está haciendo Google"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
  En agosto de 2025, Google [anunció](https://developer.android.com/developer-verification) un nuevo requisito: a partir de septiembre de 2026, **todos los desarrolladores de aplicaciones para Android deberán registrarse de forma centralizada en Google** antes de que su software pueda instalarse en cualquier dispositivo. No solo las aplicaciones de Play Store: todas las aplicaciones. Esto incluye las aplicaciones que se comparten entre amigos, las distribuidas a través de [F-Droid](https://f-droid.org/) y las creadas por aficionados para uso personal. Los desarrolladores independientes, los grupos religiosos y comunitarios, así como los aficionados, se verán impedidos de desarrollar y distribuir su software.
# [en] what_registration: "Registration requires:"
what_registration: "Para registrarse es necesario:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Pagar una cuota a Google"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Aceptar los Términos y Condiciones de Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Presentar documento de identidad oficial"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Aportar pruebas de su clave privada de firma"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Listar todos los identificadores actuales y futuros de la aplicación"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Si un desarrollador no cumple los requisitos, sus aplicaciones se bloquearán de forma silenciosa en todos los dispositivos Android del mundo."
# [en] impact_heading: "Who this hurts"
impact_heading: "A quién perjudica esto"
# [en] impact_you_heading: "You"
impact_you_heading: "A ti"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Compraste un teléfono Android porque Google te dijo que era un sistema abierto. Podías instalar lo que quisieras, y ese era el trato."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >-
  Google está modificando ahora esas condiciones, con carácter retroactivo, en los dispositivos que ya tienes. Una vez que se aplique la actualización, solo podrás ejecutar software que Google haya aprobado previamente. En tu teléfono: que es de *tu* propiedad y por el que has pagado *tú*.
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Desarrolladores Independientes"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: >-
 La primera aplicación de un adolescente, una herramienta de privacidad creada por un voluntario o una versión beta interna confidencial de una empresa. Da igual. A partir de septiembre de 2026, ninguna de ellas podrá instalarse sin el visto bueno de Google.
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >- 
  [F-Droid](https://f-droid.org), que alberga miles de aplicaciones gratuitas y de código abierto para Android, ha calificado esto como una [amenaza existencial](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow lo llama ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Gobiernos y Sociedad civil"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
  Google tiene un [historial documentado](https://www.aclu.org/news/free-speech/app-store-oligopoly) de acatar las exigencias de los regímenes autoritarios cuando estos solicitan la retirada de aplicaciones. Con este programa, el software que hace funcionar las instituciones de tu país dependerá de la voluntad de una única empresa extranjera que no rinde cuentas a nadie.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: "La [EFF califica](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) el control de acceso a las aplicaciones como \"una vía cada vez más amplia hacia la censura en Internet\"."
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "La \"vía de escape\" de Google es una puerta trampa"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: "Google dice que los \"usuarios avanzados\" pueden [\"seguir instalando\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) Aplicaciones no verificadas. Así es cómo se ve *en realidad*:"
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Accede a los Ajustes del Sistema y busca las Opciones de Desarrollador"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Toca **siete veces** el número de compilación para activar el Modo de Desarrollador"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Ignora las pantallas de alerta de coacción"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Introduce tu PIN"
# [en] flow_step5: "Restart the device"
flow_step5: "Reinicia el dispositivo"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Espera 24 horas**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Vuelve, ignora más pantallas que asustan"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Selecciona \"permitir temporalmente\" (7 días) o \"permitir indefinidamente\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Confirma, de nuevo, que comprendes \"los riesgos\""
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Nueve pasos. Un periodo de espera obligatorio de 24 horas. *Para instalar software en un dispositivo de tu propiedad.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: >-
  Y lo que es peor: este proceso se ejecuta íntegramente a través de **los Servicios de Google Play**, no del sistema operativo Android. Google puede modificarlo, endurecerlo o eliminarlo en cualquier momento, sin necesidad de actualizar el sistema operativo ni de obtener consentimiento alguno. Y, a día de hoy, no se ha incluido en ninguna versión beta, preview o canary (build inicial). Solo existe como una entrada de blog y algunos mockups (simulación de funcionamiento).
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Esto es más grande que Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Si Google puede bloquear retroactivamente miles de millones de dispositivos que se vendieron como plataformas abiertas, todos los fabricantes de hardware del planeta están pendientes de lo que ocurre."
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: "El principio que se está imponiendo es el siguiente: **la empresa que ha fabricado tu dispositivo es la que decide, una vez que lo has comprado, qué software puedes utilizar.** En el ámbito del software, a esto se le llama \"tirar de la alfombra\"; pero al menos siempre podías instalar software de la competencia. En el ámbito del hardware, se trata de un *hecho consumado* que te priva de tu capacidad de decisión y te deja indefenso ante los caprichos de un único guardián que no rinde cuentas a nadie y que ha sido declarado culpable de monopolio."
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: "La apertura de Android nunca fue solo una característica más. Era la *promesa* que lo distinguía del iPhone. Millones de personas eligieron Android precisamente por esa razón. Ahora, Google está incumpliendo esa promesa de forma unilateral, en dispositivos que *ya* están en manos de los usuarios, porque ha decidido que cuenta con suficiente dominio del mercado y influencia sobre los reguladores como para salirse con la suya."
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"La envidia de google hacia Apple amenaza con desmantelar el legado abierto de Android.\"* "
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Pero espera, ¿esto no es..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...solo sobre seguridad?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
  El argumento de la seguridad es una cortina de humo. Google Play Protect ya analiza en busca de malware independientemente de la identidad del desarrollador. Exigir una identificación oficial no hace que el código sea más seguro. Lo que hace es que *los desarrolladores* sean identificables y controlables. Los autores de malware pueden registrarse. Los desarrolladores independientes y los disidentes, a menudo, no pueden. La [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) es tajante: el control de acceso basado en la identidad es una herramienta de censura, no de seguridad.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...todavía una instalación paralela si utilizas el método avanzado?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
  Nueve pasos, una espera de 24 horas, oculto en las Opciones de Desarrollador, y proporcionado a través de un servicio propio que Google puede revocar cuando quiera. Eso no es una instalación paralela. Es un **mecanismo disuasorio** diseñado para garantizar que casi nadie lo complete. Y como funciona a través de Play Services en lugar de sobre el SO, Google puede restringirlo o eliminarlo sin previo aviso.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...solo un problema si tienes algo que esconder?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
  Los informantes, periodistas y activistas que viven bajo gobiernos autoritarios serán las primeras víctimas. Las personas que sufren violencia doméstica serán las siguientes. Todos estos grupos tienen motivos legítimos para distribuir o utilizar software sin que su identidad legal quede registrada en una base de datos de Google. La contribución anónima al código abierto es una tradición más antigua que la propia Google. Esta política pone fin a ello en Android.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...lo mismo que hace Apple?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
  Apple ha sido un jardín amurallado desde el primer día. La gente eligió Android *porque era diferente*. Decir "Apple también lo hace" es una carrera hacia el abismo y un argumento del *tú también* poco convincente. Y bajo la presión regulatoria (la Ley de Mercados Digitales de la UE), incluso Apple se ve obligada a abrirse. Google, por su parte, va en la dirección opuesta: intenta afianzar aún más su posición de guardián.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...solo 25 dólares y algo de papeleo?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
  Quizás, si eres un desarrollador en Estados Unidos con una tarjeta de crédito y un carnet de conducir. Intenta ponerte en la piel de un estudiante del África subsahariana, de un disidente en Myanmar o de un voluntario que mantiene una aplicación de salud comunitaria. El coste no es solo económico: estás entregando tu documento de identidad oficial y las pruebas de tus claves de firma a una empresa que [accede de forma habitual](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) a las exigencias del gobierno de retirar aplicaciones y revelar la identidad de los desarrolladores.
