social_callout_facebook_6: "¿Tu teléfono, tu elección? No si Google se sale con la suya. A partir de 2026, planean bloquear cualquier aplicación cuyo desarrollador no se haya registrado y haya proporcionado un documento de identidad oficial. Esto nos afecta a todos. {url}"
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: "Google está restringiendo de forma retroactiva el acceso a miles de millones de dispositivos que se vendieron como plataformas abiertas. Esta «estafa» supone una amenaza para los desarrolladores independientes y las tiendas de aplicaciones alternativas como F-Droid. {url}"
