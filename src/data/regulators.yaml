      - text:
          en: "Contact the [European Data Protection Board (EDPB)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_en#contact) — mandatory developer ID collection raises data protection concerns under GDPR"
          de: "Kontaktieren Sie den [Europäischen Datenschutzausschuss (EDPB)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_de#contact) — die verpflichtende Erfassung von Entwickler-Ausweisdaten wirft Datenschutzbedenken unter der DSGVO auf"
          fr: "Contactez le [Comité européen de la protection des données (CEPD)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_fr#contact) — la collecte obligatoire de pièces d'identité des développeurs soulève des préoccupations en matière de protection des données au titre du RGPD"
          es: "Contacte con el [Comité Europeo de Protección de Datos (CEPD)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_es#contact) — la recopilación obligatoria de identificación de desarrolladores plantea preocupaciones sobre la protección de datos en virtud del RGPD"
          it: "Contatta il [Comitato europeo per la protezione dei dati (EDPB)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_it#contact) — la raccolta obbligatoria dei documenti d'identità degli sviluppatori solleva preoccupazioni sulla protezione dei dati ai sensi del GDPR"
          nl: "Neem contact op met de [Europese Gegevensbeschermingsraad (EDPB)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_nl#contact) — de verplichte verzameling van identiteitsgegevens van ontwikkelaars roept zorgen op over gegevensbescherming onder de AVG"
          pl: "Skontaktuj się z [Europejską Radą Ochrony Danych (EROD)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_pl#contact) — obowiązkowe zbieranie dokumentów tożsamości deweloperów budzi obawy dotyczące ochrony danych w ramach RODO"
          pt-BR: "Entre em contato com o [Comitê Europeu para a Proteção de Dados (EDPB)](https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies/search-all-eu-institutions-and-bodies/european-data-protection-board-edpb_pt#contact) — a coleta obrigatória de identificação dos desenvolvedores levanta preocupações de proteção de dados sob o GDPR"
      - text:
          en: "Raise awareness with the [European Competition Network (ECN)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — the network coordinating EU antitrust enforcement across member states"
          de: "Melden Sie den Fall beim [Europäischen Wettbewerbsnetz (ECN)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — das Netzwerk, das die EU-Kartellrechtsdurchsetzung in den Mitgliedstaaten koordiniert"
          fr: "Signalez le cas au [Réseau européen de la concurrence (REC)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — le réseau coordonnant l'application du droit de la concurrence dans les États membres de l'UE"
          es: "Comuníquese con la [Red Europea de Competencia (ECN)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — la red que coordina la aplicación de las normas antimonopolio de la UE en los estados miembros"
          it: "Segnala il caso alla [Rete europea della concorrenza (ECN)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — la rete che coordina l'applicazione delle norme antitrust dell'UE negli stati membri"
          nl: "Breng de zaak onder de aandacht van het [Europees Mededingingsnetwerk (ECN)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — het netwerk dat de EU-antitrusthandhaving coördineert"
          pl: "Zgłoś sprawę do [Europejskiej Sieci Konkurencji (ECN)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — sieci koordynującej egzekwowanie przepisów antymonopolowych UE w państwach członkowskich"
          pt-BR: "Comunique o caso à [Rede Europeia da Concorrência (ECN)](https://competition-policy.ec.europa.eu/antitrust-and-cartels/european-competition-network_en) — a rede que coordena a aplicação das regras antitruste da UE nos estados membros"
      - text:
          en: "Contact the [IMCO Committee](https://www.europarl.europa.eu/committees/en/imco/home/highlights) — the European Parliament's Committee on Internal Market and Consumer Protection"
          de: "Kontaktieren Sie den [IMCO-Ausschuss](https://www.europarl.europa.eu/committees/de/imco/home/highlights) — den Ausschuss für Binnenmarkt und Verbraucherschutz des Europäischen Parlaments"
          fr: "Contactez la [Commission IMCO](https://www.europarl.europa.eu/committees/fr/imco/home/highlights) — la commission du marché intérieur et de la protection des consommateurs du Parlement européen"
          es: "Contacte con la [Comisión IMCO](https://www.europarl.europa.eu/committees/es/imco/home/highlights) — la Comisión de Mercado Interior y Protección del Consumidor del Parlamento Europeo"
          it: "Contatta la [Commissione IMCO](https://www.europarl.europa.eu/committees/it/imco/home/highlights) — la Commissione per il mercato interno e la protezione dei consumatori del Parlamento europeo"
          nl: "Neem contact op met de [IMCO-commissie](https://www.europarl.europa.eu/committees/nl/imco/home/highlights) — de commissie interne markt en consumentenbescherming van het Europees Parlement"
          pl: "Skontaktuj się z [Komisją IMCO](https://www.europarl.europa.eu/committees/pl/imco/home/highlights) — Komisją Rynku Wewnętrznego i Ochrony Konsumentów Parlamentu Europejskiego"
          pt-BR: "Entre em contato com a [Comissão IMCO](https://www.europarl.europa.eu/committees/pt/imco/home/highlights) — a Comissão do Mercado Interno e da Proteção dos Consumidores do Parlamento Europeu"
