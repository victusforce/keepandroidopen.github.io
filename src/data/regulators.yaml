      - text:
          ar: "قدم شكوى إلى [سياسة المنافسة في الاتحاد الأوروبي] (https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_en) "
          en: "Complain to the [EU Competition Policy](https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_en)"
          da: "Klag til [EU Competition Policy](https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_da)"
          nl: "Dien een klacht in bij de [EU-mededingingsbeleid](https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_nl)"
          ru: "Подайте жалобу в [EU Competition Policy](https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_en)"
          de: "Reichen Sie eine Beschwerde bei der [EU-Wettbewerbspolitik](https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_de) ein."
          fr: "Déposez une plainte auprès de la [Politique de concurrence de l'UE](https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_fr)"
          es: "Presente una reclamación ante la [Política de Competencia de la UE](https://competition-policy.ec.europa.eu/antitrust-and-cartels/contact_es)"
