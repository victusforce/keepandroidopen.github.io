      pt-BR: "Aotearoa / Nova Zelândia"
      pl: "Nowa Zelandia"
      zh-CN: "奥特亚罗瓦/新西兰"
      zh-TW: "奧特亞羅瓦/紐西蘭"
    items:
      - text:
          en: "Email: [contact@comcom.govt.nz](mailto:contact@comcom.govt.nz?cc=nz@keepandroidopen.org)"
          pl: "E-mail: [contact@comcom.govt.nz](mailto:contact@comcom.govt.nz?cc=nz@keepandroidopen.org)"
          zh-CN: "电子邮件：[contact@comcom.govt.nz](mailto:contact@comcom.govt.nz?cc=nz@keepandroidopen.org)"
          zh-TW: "電子郵件：[contact@comcom.govt.nz](mailto:contact@comcom.govt.nz?cc=nz@keepandroidopen.org)"
      - text:
          en: "Phone: [0800 943 600](tel:08009436000)"
          pl: "Telefon: [0800 943 600](tel:08009436000)"
          zh-CN: "电话：[0800 943 600](tel:08009436000)"
          zh-TW: "電話：[0800 943 600](tel:08009436000)"
      - text:
          en: "Report anti-competitive conduct to the [Commerce Commission](https://www.comcom.govt.nz/report-a-concern/)"
          pl: "Zgłoś praktyki antykonkurencyjne do nowozelandzkiej [Komisji Handlu (Commerce Commission)](https://www.comcom.govt.nz/report-a-concern/)"
          zh-CN: "向 [商务委员会](https://www.comcom.govt.nz/report-a-concern/) 举报反竞争行为"
          zh-TW: "向 [商務委員會](https://www.comcom.govt.nz/report-a-concern/) 舉報反競爭行為"
      - text:
          en: "Contact the Minister of Commerce and Consumer Affairs, Cameron Brewer: [cameron.brewer@parliament.govt.nz](mailto:cameron.brewer@parliament.govt.nz)"
          pl: "Skontaktuj się z Ministrem Handlu i Spraw Konsumenckich, Cameron Brewer: [cameron.brewer@parliament.govt.nz](mailto:cameron.brewer@parliament.govt.nz)"
          zh-CN: "联系商务与消费者事务部部长，卡梅伦·布鲁尔：[cameron.brewer@parliament.govt.nz](mailto:cameron.brewer@parliament.govt.nz)"
          zh-TW: "聯絡商務與消費者事務部長，卡梅倫·布魯爾：[cameron.brewer@parliament.govt.nz](mailto:cameron.brewer@parliament.govt.nz)"
      - text:
          en: "Contact your local Member of Parliament. If you don't know your electorate, find it at [vote.nz](https://www.vote.nz)"
          pl: "Skontaktuj się z lokalnym członkiem parlamentu. Jeśli nie znasz swojego okręgu, sprawdź go na stronie [vote.nz](https://www.vote.nz)"
          zh-CN: "联系您当地的议员。如果您不知道您的选区，可在[vote.nz](https://www.vote.nz)查找"
          zh-TW: "聯絡您當地的議員。如果您不知道您的選區，可在[vote.nz](https://www.vote.nz)查找"
      - text:
          en: "Contact [InternetNZ](https://internetnz.nz) — the non-profit advocate for an open internet in Aotearoa: [office@internetnz.net.nz](mailto:office@internetnz.net.nz)"
          pl: "Skontaktuj się z [InternetNZ](https://internetnz.nz) — organizacją non-profit, która jest rzecznikiem otwartego internetu w Aotearoa: [office@internetnz.net.nz](mailto:office@internetnz.net.nz)"
          zh-CN: "联系[InternetNZ](https://internetnz.nz) — 新西兰开放互联网的非盈利倡导者：[office@internetnz.net.nz](mailto:office@internetnz.net.nz)"
          zh-TW: "聯絡[InternetNZ](https://internetnz.nz) — 新西蘭開放互聯網的非盈利倡導者：[office@internetnz.net.nz](mailto:office@internetnz.net.nz)"
      - text:
          en: "Contact [Consumer NZ](https://www.consumer.org.nz/about/contact-us) — Aotearoa's independent consumer advocacy organisation. Ask them to lodge a formal complaint to the Commerce Commission on behalf of consumers."
          pl: "Skontaktuj się z [Consumer NZ](https://www.consumer.org.nz/about/contact-us) — niezależną organizacją ochrony konsumentów w Aotearoa. Poproś ich o złożenie formalnej skargi do Komisji Handlu w imieniu konsumentów."
          zh-CN: "联系[Consumer NZ](https://www.consumer.org.nz/about/contact-us) — 新西兰独立的消费者权益组织。要求他们代表消费者向商务委员会提出正式投诉。"
          zh-TW: "聯絡[Consumer NZ](https://www.consumer.org.nz/about/contact-us) — 新西蘭獨立的消費者權益組織。要求他們代表消費者向商務委員會提出正式投訴。"
