      - text:
          ar: "_ملاحظة: من المقرر أن تكون تايلاند واحدة من [الدول الأربع الأولى](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) التي سيتم فيها تطبيق تسجيل المطورين._"
          en: "_Note: Thailand is slated to be one of the [initial 4 countries](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) where developer registration will be enforced_"
          da: "_Bemærk: Thailand er planlagt til at være et af de [første 4 lande](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) hvor udviklerregistrering vil blive håndhævet_"
          ru: "_Примечание: Таиланд входит в число [первых 4 стран](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/), где будет принудительно введена регистрация разработчиков_"
          de: "*Hinweis: Thailand wird voraussichtlich zu den [ersten vier Ländern](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) gehören, in denen die Entwicklerregistrierung obligatorisch wird.*"
          fr: "_Remarque : La Thaïlande devrait faire partie des [4 premiers pays](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) où l'enregistrement des développeurs sera obligatoire._"
          es: "_Nota: Tailandia va a ser uno de los [cuatro primeros países](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) en los que el registro de desarrolladores será obligatorio._"
          it: "_Nota: la Thailandia è tra i [primi 4 paesi](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) in cui sarà obbligatoria la registrazione degli sviluppatori_"
          ko: "_비고: 태국은 개발자 인증이 시행되는 [초기 4개 국가](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) 중 하나입니다._"
          cs: "_Poznámka: Thajsko je jednou ze [4 prvních zemí](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/), kde bude registrace vývojářů zavedena_"
          sk: "_Poznámka: Thajsko je zaradené medzi [prvých 4 krajiny](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/), kde bude povinná registrácia vývojárov_"
          el: "_Σημείωση: Η Ταϊλάνδη προορίζεται να είναι μία από τις [4 αρχικές χώρες](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) όπου η εγγραφή των προγραμματιστών θα επιβληθεί_"
          th: "_หมายเหตุ: ประเทศไทยเป็นหนึ่งใน [4 ประเทศแรก](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) ที่จะมีการบังคับใช้การลงทะเบียนนักพัฒนา_"
          id: "_Catatan: Tailan direncanakan menjadi salah satu dari [4 negara awal](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) di mana pendaftaran pengembang akan diberlakukan_"
          tr: "_Not: Tayland'ın geliştirici kaydının mecburi olacağı [ilk 4 ülkeden biri](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) olması beklenmektedir_"
          uk: "_Примітка: Таїланд має стати однією з [перших 4 країн](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/), де буде запроваджено реєстрацію розробників_"
          pl: "_Uwaga: Tajlandia ma być jednym z [pierwszych 4 krajów](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/), w których wymóg rejestracji deweloperów zostanie wprowadzony w pierwszej kolejności_"
          pt-BR: "_Nota: A Tailândia foi selecionada para ser um dos [4 países iniciais](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) onde o registro dos desenvolvedores será imposto_"
          zh-CN: "_注意：泰国预计将成为强制执行开发者注册的[首批 4 个国家](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/)之一_"
